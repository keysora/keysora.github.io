<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chimera</title>
  <link rel="icon" href="" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 20px 0;
    }

    .avatar {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      pointer-events: none;
    }

    .menu-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px 0;
      background: linear-gradient(to bottom, #3d2c1e, #000);
      position: relative;
      z-index: 1;
    }

    .menu-item {
      background: linear-gradient(145deg, #4b2c20, #1a0e07);
      color: beige;
      padding: 15px 25px;
      border-radius: 0 0 20px 20px;
      text-decoration: none;
      font-size: 1.2rem;
      box-shadow: 0 5px 10px rgba(0,0,0,0.4);
      transition: transform 0.3s ease;
      min-width: 120px;
      text-align: center;
    }

    .menu-item:hover {
      transform: scale(1.05);
      cursor: pointer;
    }

    .content {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      max-width: 90vw;
      max-height: 80vh;
      overflow: auto;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .close-btn {
      margin-top: 15px;
      background: darkred;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    canvas#rootsCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://i.giphy.com/NdfmEYiiMpt6UwAeWs.webp" alt="Avatar" class="avatar" />
  </div>

  <div class="menu-container">
    <a href="#" class="menu-item">Main</a>
    <a href="#" class="menu-item">Info</a>
    <a href="#" class="menu-item">Bot</a>
    <div class="menu-item" onclick="openPopup('popup1')">Work</div>
    <div class="menu-item" onclick="openPopup('popup2')">News</div>
  </div>

  <div class="content">
    <p>Welcome to the realm of the Chimera. This is your center of power, mystery, and creation. Choose your path.</p>
  </div>

  <div class="popup" id="popup1">
    <div class="popup-content">
      <p>This is popup window #1 with detailed information about work.</p>
      <button class="close-btn" onclick="closePopup('popup1')">Close</button>
    </div>
  </div>

  <div class="popup" id="popup2">
    <div class="popup-content">
      <p>This is popup window #2 with current updates and news.</p>
      <button class="close-btn" onclick="closePopup('popup2')">Close</button>
    </div>
  </div>

  <canvas id="rootsCanvas"></canvas>
  <script>
    const canvas = document.getElementById("rootsCanvas");
    const ctx = canvas.getContext("2d");
    let width, height;

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const roots = [];

    function createRoot() {
      const root = {
        x: Math.random() * width,
        y: 0,
        path: [],
        speed: 1 + Math.random() * 1.5,
        length: 80 + Math.random() * 70,
        color: `rgba(${Math.floor(60 + Math.random()*40)}, ${Math.floor(40 + Math.random()*50)}, ${Math.floor(20 + Math.random()*40)}, 0.9)`,
        opacity: 1
      };
      roots.push(root);
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      roots.forEach((root, index) => {
        if (root.path.length < root.length) {
          const last = root.path[root.path.length - 1] || { x: root.x, y: root.y };
          const angle = (Math.random() - 0.5) * Math.PI;
          const distance = root.speed;
          const newPoint = {
            x: last.x + Math.cos(angle) * distance,
            y: last.y + Math.sin(angle) * distance
          };
          root.path.push(newPoint);
        } else {
          root.opacity -= 0.01;
          if (root.opacity <= 0) roots.splice(index, 1);
        }

        ctx.beginPath();
        ctx.strokeStyle = root.color.replace("0.9", root.opacity.toFixed(2));
        ctx.lineWidth = 1.2;
        ctx.moveTo(root.x, root.y);
        for (let p of root.path) {
          ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
      });

      requestAnimationFrame(draw);
    }

    setInterval(createRoot, 600); // скорость появления корней
    draw();
  </script>

  <script>
    function openPopup(id) {
      document.getElementById(id).style.display = "flex";
    }

    function closePopup(id) {
      document.getElementById(id).style.display = "none";
    }
  </script>
</body>
</html>
