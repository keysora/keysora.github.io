
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chimera</title>
  <link rel="icon" href="" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      font-family: 'Orbitron', sans-serif;
      color: beige;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 20px 0 10px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
    }

    .menu-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      background: linear-gradient(to bottom, #3e2c1e, #1b1a17);
      padding: 20px 10px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
      position: relative;
      z-index: 2;
    }

    .menu-item {
      padding: 15px 25px;
      border-radius: 15px;
      background: linear-gradient(145deg, #6b4423, #000);
      color: beige;
      text-decoration: none;
      font-size: 1.2rem;
      box-shadow: 0 6px 12px rgba(0,0,0,0.6);
      transform: perspective(500px) rotateX(15deg);
      transition: 0.3s ease;
    }

    .menu-item:hover {
      transform: perspective(500px) rotateX(5deg) scale(1.05);
      cursor: pointer;
      background: darkorange;
    }

    .content-text {
      max-width: 90vw;
      margin: 40px auto;
      padding: 20px;
      background: rgba(30, 20, 10, 0.5);
      border-radius: 10px;
      font-size: 1.1rem;
      line-height: 1.8;
      color: beige;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: #222;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: beige;
      max-width: 90vw;
      max-height: 80vh;
      overflow: auto;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .close-btn {
      margin-top: 15px;
      background: darkred;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="rootCanvas"></canvas>
  <div class="header">
    <img src="https://i.giphy.com/NdfmEYiiMpt6UwAeWs.webp" alt="Top Avatar" class="avatar" />
  </div>

  <div class="menu-container">
    <a href="#" class="menu-item">Home</a>
    <a href="#" class="menu-item">About</a>
    <a href="#" class="menu-item">Projects</a>
    <div class="menu-item" onclick="openPopup('popup1')">Work</div>
    <div class="menu-item" onclick="openPopup('popup2')">News</div>
  </div>

  <div class="content-text">
    This is a placeholder text block that adapts to screen size and stays within the main layout.
  </div>

  <div class="popup" id="popup1">
    <div class="popup-content">
      <p>This is popup #1 with updated font and spacing.</p>
      <button class="close-btn" onclick="closePopup('popup1')">Close</button>
    </div>
  </div>

  <div class="popup" id="popup2">
    <div class="popup-content">
      <p>This is popup #2 with updated font and spacing.</p>
      <button class="close-btn" onclick="closePopup('popup2')">Close</button>
    </div>
  </div>

  <script>
    function openPopup(id) {
      document.getElementById(id).style.display = 'flex';
    }
    function closePopup(id) {
      document.getElementById(id).style.display = 'none';
    }
  </script>

  <script>
    const canvas = document.getElementById("rootCanvas");
    const ctx = canvas.getContext("2d");
    let width, height;

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    let roots = [];
    function createRoot() {
      roots.push({
        x: Math.random() * width,
        y: 0,
        length: 0,
        maxLength: Math.random() * 100 + 50,
        speed: Math.random() * 2 + 0.5
      });
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      roots.forEach((r, i) => {
        r.length += r.speed;
        ctx.beginPath();
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x, r.y + r.length);
        ctx.strokeStyle = "darkgreen";
        ctx.lineWidth = 2;
        ctx.stroke();

        if (r.length >= r.maxLength) {
          roots.splice(i, 1);
        }
      });
      requestAnimationFrame(draw);
    }

    setInterval(createRoot, 800);
    draw();
  </script>
</body>
</html>
