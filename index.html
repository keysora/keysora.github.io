<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OX</title>
  <link rel="icon" href="https://i.ibb.co/tM4CLRrV/2.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      font-family: 'Orbitron', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    #bloodCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    .header {
      background: black;
      text-align: center;
      padding: 20px 0 5px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
    }

    .intro-text {
      text-align: center;
      margin-top: 5px;
      margin-bottom: 2px;
      font-size: 1.5rem;
      padding: 0 10px;
    }

    .menu-container {
      background: url('https://cdna.artstation.com/p/assets/images/images/058/834/064/original/kayan-102.gif?1675085766') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 5px 20px 5px;
    }

    .menu-item {
      width: 90%;
      max-width: 500px;
      background: linear-gradient(135deg, red, black);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      font-size: 1.2rem;
      text-decoration: none;
      color: white;
      transition: 0.3s ease;
    }

    .menu-item:hover {
      transform: scale(1.03);
      cursor: pointer;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: #222;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      max-width: 90vw;
      max-height: 80vh;
      overflow: auto;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-sizing: border-box;
    }

    .close-btn {
      margin-top: 15px;
      background: red;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .bottom-avatar-container {
      text-align: center;
      padding: 5px 0;
    }

    @media screen and (max-width: 600px) {
      .intro-text {
        font-size: 1.2rem;
      }

      .avatar {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <!-- Канвас должен быть САМЫМ ПЕРВЫМ в body -->
  <canvas id="bloodCanvas"></canvas>

  <div class="header">
    <a href="https://ibb.co/xghjkx" target="_blank">
      <img src="https://i.ibb.co/ghjhjkkmV/2.png" alt="Top Avatar" class="avatar" />
    </a>
  </div>

  <div class="intro-text">
    WELCOME BACK!
  </div>

  <div class="menu-container">
    <a href="https://example.com/link1" class="menu-item">bot</a>
    <a href="https://example.com/link2" class="menu-item">chat</a>
    <div class="menu-item" onclick="openPopup('popup1')">work</div>
    <div class="menu-item" onclick="openPopup('popup2')">news</div>
  </div>

  <div class="popup" id="popup1">
    <div class="popup-content">
      <p>Это всплывающее окно №1</p>
      <button class="close-btn" onclick="closePopup('popup1')">close</button>
    </div>
  </div>

  <div class="popup" id="popup2">
    <div class="popup-content">
      <p>Это всплывающее окно №2</p>
      <button class="close-btn" onclick="closePopup('popup2')">close</button>
    </div>
  </div>

  <!-- Скрипт матрицы -->
  <script>
    const canvas = document.getElementById("bloodCanvas");
    const ctx = canvas.getContext("2d");

    let width, height;
    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const fontSize = 16;
    const columns = Math.floor(width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = "red";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = Math.random() > 0.5 ? "0" : "1";
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        ctx.fillText(text, x, y);

        if (y > height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>

  <!-- Скрипт для открытия/закрытия окон -->
  <script>
    function openPopup(id) {
      document.getElementById(id).style.display = "flex";
    }

    function closePopup(id) {
      document.getElementById(id).style.display = "none";
    }
  </script>
</body>
</html>
