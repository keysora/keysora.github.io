  <canvas id="bloodCanvas"></canvas>

<script>
  const canvas = document.getElementById("bloodCanvas");
  const ctx = canvas.getContext("2d");

  let width, height;
  function resizeCanvas() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const meteors = [];

  function createMeteor() {
    meteors.push({
      x: Math.random() * width,
      y: -20,
      size: Math.random() * 6 + 4,
      speed: Math.random() * 3 + 2,
      trail: [],
      dripping: false,
      life: 60
    });
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);

    meteors.forEach((m, i) => {
      if (!m.dripping) {
        m.y += m.speed;
        m.trail.push({ x: m.x, y: m.y });

        if (m.y > height - 10) {
          m.dripping = true;
        }
      } else {
        m.life--;
        m.trail.push({ x: m.x + (Math.random() - 0.5) * 2, y: m.y + (60 - m.life) });
      }

      // Draw meteor trail or drip
      ctx.beginPath();
      ctx.fillStyle = "red";
      for (let j = 0; j < m.trail.length; j++) {
        const point = m.trail[j];
        ctx.moveTo(point.x, point.y);
        ctx.arc(point.x, point.y, m.size * (1 - j / m.trail.length), 0, 2 * Math.PI);
      }
      ctx.fill();

      if (m.life <= 0) {
        meteors.splice(i, 1);
      }
    });

    requestAnimationFrame(draw);
  }

  setInterval(createMeteor, 300); // частота появления
  draw();
</script>

<style>
  #bloodCanvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 999;
  }
</style>
