<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METFOX</title>
  <link rel="icon" href="https://i.ibb.co/tM4CLRrV/2.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .header, .bottom-avatar-container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px 0 5px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
    }

    .intro-text {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 5px;
      margin-bottom: 20px;
      font-size: 1.5rem;
      padding: 0 10px;
    }

    .menu-container {
      position: relative;
      z-index: 1;
      background: url('https://cdna.artstation.com/p/assets/images/images/058/834/064/original/kayan-102.gif?1675085766') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 5px 20px;
    }

    .menu-item {
      width: 90%;
      max-width: 500px;
      background: linear-gradient(135deg, red, black);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      font-size: 1.2rem;
      text-decoration: none;
      color: white;
      transition: 0.3s ease;
    }

    .menu-item:hover {
      transform: scale(1.03);
      cursor: pointer;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: #222;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      max-width: 90vw;
      max-height: 80vh;
      overflow: auto;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-sizing: border-box;
    }

    .close-btn {
      margin-top: 15px;
      background: red;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    @media screen and (max-width: 600px) {
      .intro-text {
        font-size: 1.2rem;
      }

      .avatar {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <!-- Матрица -->
  <canvas id="matrixCanvas"></canvas>

  <!-- Верхний аватар -->
  <div class="header">
    <a href="https://ibb.co/xghjkx" target="_blank">
      <img src="https://i.ibb.co/ghjhjkkmV/2.png" alt="Top Avatar" class="avatar" />
    </a>
  </div>

  <!-- Текст -->
  <div class="intro-text">WELCOME BACK!</div>

  <!-- Меню -->
  <div class="menu-container">
    <a href="https://example.com/link1" class="menu-item">bot</a>
    <a href="https://example.com/link2" class="menu-item">chat</a>
    <div class="menu-item" onclick="openPopup('popup1')">work</div>
    <div class="menu-item" onclick="openPopup('popup2')">news</div>
  </div>

  <!-- Нижний аватар -->
  <div class="bottom-avatar-container">
    <a href="https://ibb.co/xghjkx" target="_blank">
      <img src="https://i.ibb.co/ghjhjkkmV/2.png" alt="Bottom Avatar" class="avatar" />
    </a>
  </div>

  <!-- Попапы -->
  <div class="popup" id="popup1">
    <div class="popup-content">
      <p>Это всплывающее окно №1</p>
      <button class="close-btn" onclick="closePopup('popup1')">close</button>
    </div>
  </div>

  <div class="popup" id="popup2">
    <div class="popup-content">
      <p>Это всплывающее окно №2</p>
      <button class="close-btn" onclick="closePopup('popup2')">close</button>
    </div>
  </div>

  <!-- JS -->
  <script>
    function openPopup(id) {
      document.getElementById(id).style.display = "flex";
    }

    function closePopup(id) {
      document.getElementById(id).style.display = "none";
    }

    // Матрица с вспышками
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "01METFOX";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array.from({ length: columns }, () => 1);

    const flashes = []; // Массив для хранения вспышек

    function createFlash() {
      const flash = {
        x: Math.floor(Math.random() * columns), // случайная позиция по X
        y: 0, // начинается с верхней части
        speed: Math.random() * 2 + 2, // скорость падения
        length: Math.floor(Math.random() * 10) + 5, // длина падающей строки
        interval: Math.random() * 200 + 300 // интервал между вспышками
      };
      flashes.push(flash);
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "red";
      ctx.font = `${fontSize}px monospace`;

      // Генерация вспышек
      if (Math.random() < 0.10) { // вероятность появления вспышки
        createFlash();
      }

      // Отрисовка вспышек
      flashes.forEach((flash, index) => {
        for (let i = 0; i < flash.length; i++) {
          const text = letters.charAt(Math.floor(Math.random() * letters.length));
          ctx.fillText(text, flash.x * fontSize, flash.y * fontSize);

          flash.y += flash.speed; // движение вниз
          if (flash.y * fontSize > canvas.height) {
            flashes.splice(index, 1); // Удаление вспышки, если она дошла до конца
          }
        }
      });
    }

    setInterval(drawMatrix, 50); // Настройка интервала для отрисовки

    // Обновление канваса при изменении размера окна
    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
