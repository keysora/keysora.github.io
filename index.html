<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OX</title>
  <link rel="icon" href="" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      font-family: 'Orbitron', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }

    .header {
      background: black;
      text-align: center;
      padding: 20px 0 10px;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
    }

    .menu-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px 0;
      background: linear-gradient(to bottom, #1a1a1a, #3b2f2f);
      position: relative;
      z-index: 1;
    }

    .menu-item {
      width: 140px;
      background: linear-gradient(145deg, #8B4513, #A0522D);
      border: 2px solid #654321;
      border-radius: 15px 15px 40px 40px;
      padding: 15px;
      text-align: center;
      font-size: 1rem;
      text-decoration: none;
      color: beige;
      transition: 0.3s ease;
    }

    .menu-item:hover {
      transform: scale(1.05);
      background: linear-gradient(145deg, #A0522D, #8B4513);
      cursor: pointer;
    }

    .content-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 15px;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: #2c2c2c;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: beige;
      max-width: 90vw;
      max-height: 80vh;
      overflow: auto;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    .close-btn {
      margin-top: 15px;
      background: darkred;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    @media screen and (max-width: 600px) {
      .menu-container {
        flex-direction: column;
        align-items: center;
      }

      .menu-item {
        width: 80%;
      }
    }
  </style>
</head>
<body>
  <canvas id="rootCanvas"></canvas>

  <div class="header">
    <img src="https://i.giphy.com/NdfmEYiiMpt6UwAeWs.webp" alt="Top Avatar" class="avatar" />
  </div>

  <div class="menu-container">
    <a href="#" class="menu-item">Bot</a>
    <a href="#" class="menu-item">Chat</a>
    <a href="#" class="menu-item">Map</a>
    <div class="menu-item" onclick="openPopup('popup1')">Work</div>
    <div class="menu-item" onclick="openPopup('popup2')">News</div>
  </div>

  <div class="content-container">
    <p>
      Welcome to the realm of Chimera. This platform brings you closer to the fusion of myth and machine, where the digital meets the primal.
    </p>
  </div>

  <div class="popup" id="popup1">
    <div class="popup-content">
      <p>This is Popup Window #1. Responsive and adaptive to screen size.</p>
      <button class="close-btn" onclick="closePopup('popup1')">Close</button>
    </div>
  </div>

  <div class="popup" id="popup2">
    <div class="popup-content">
      <p>This is Popup Window #2. Scrollable content and styled for readability.</p>
      <button class="close-btn" onclick="closePopup('popup2')">Close</button>
    </div>
  </div>

  <script>
    function openPopup(id) {
      document.getElementById(id).style.display = 'flex';
    }
    function closePopup(id) {
      document.getElementById(id).style.display = 'none';
    }

    // Root Growing Animation
    const canvas = document.getElementById("rootCanvas");
    const ctx = canvas.getContext("2d");
    let w, h;

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const roots = [];
    function createRoot() {
      const x = Math.random() * w;
      roots.push({ x, y: 0, life: 0, max: 100 + Math.random() * 50, path: [] });
    }

    function animateRoots() {
      ctx.clearRect(0, 0, w, h);
      roots.forEach((r, i) => {
        r.life++;
        r.y += 1 + Math.random() * 2;
        r.path.push({ x: r.x + Math.sin(r.life / 10) * 5, y: r.y });

        ctx.beginPath();
        ctx.strokeStyle = `rgba(${100 + Math.random()*50}, ${50 + Math.random()*100}, 50, ${1 - r.life/r.max})`;
        ctx.lineWidth = 2 + Math.random();
        ctx.moveTo(r.x, 0);
        r.path.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.stroke();

        if (r.life > r.max) roots.splice(i, 1);
      });

      if (Math.random() < 0.05) createRoot();
      requestAnimationFrame(animateRoots);
    }

    animateRoots();
  </script>
</body>
</html>
