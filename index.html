<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chimera</title>
  <style>
    body {
      margin: 0;
      background: black;
      font-family: 'Orbitron', sans-serif;
      color: #f5f5dc;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 20px 0 10px;
    }

    .avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      pointer-events: none; /* makes it non-clickable */
    }

    .menu-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      background: linear-gradient(to bottom, #5e2b1c, #000);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      position: relative;
    }

    .menu-item {
      background: linear-gradient(135deg, #d2691e, #000);
      color: #f5f5dc;
      padding: 15px 25px;
      border-radius: 20px 20px 0 0;
      text-decoration: none;
      font-size: 1.1rem;
      transition: 0.3s ease;
      transform: perspective(600px) rotateX(15deg);
    }

    .menu-item:hover {
      transform: scale(1.05);
      cursor: pointer;
      background: linear-gradient(135deg, #8b4513, #000);
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: #1c1c1c;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: #f5f5dc;
      max-width: 90vw;
      max-height: 80vh;
      overflow: auto;
      font-family: Arial, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      letter-spacing: 0.5px;
    }

    .close-btn {
      margin-top: 15px;
      background: #8b0000;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .bite {
      position: absolute;
      width: 120px;
      height: 120px;
      background: url('https://i.ibb.co/gvYdnTV/bite.png') center/contain no-repeat;
      animation: biteAnim 1s ease forwards;
      pointer-events: none;
    }

    @keyframes biteAnim {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://i.giphy.com/NdfmEYiiMpt6UwAeWs.webp" alt="Avatar" class="avatar" />
  </div>

  <div class="menu-container">
    <a href="#" class="menu-item">Home</a>
    <a href="#" class="menu-item">About</a>
    <a href="#" class="menu-item">Projects</a>
    <div class="menu-item" onclick="openPopup('popup1')">Work</div>
    <div class="menu-item" onclick="openPopup('popup2')">News</div>
  </div>

  <div class="popup" id="popup1">
    <div class="popup-content">
      <p>Work popup content appears here. Text adjusts with window size.</p>
      <button class="close-btn" onclick="closePopup('popup1')">Close</button>
    </div>
  </div>

  <div class="popup" id="popup2">
    <div class="popup-content">
      <p>News popup content appears here. Text adjusts with window size.</p>
      <button class="close-btn" onclick="closePopup('popup2')">Close</button>
    </div>
  </div>

  <script>
    function openPopup(id) {
      document.getElementById(id).style.display = 'flex';
    }
    function closePopup(id) {
      document.getElementById(id).style.display = 'none';
    }

    function spawnBite() {
      const bite = document.createElement('div');
      bite.classList.add('bite');
      bite.style.top = Math.random() * window.innerHeight + 'px';
      bite.style.left = Math.random() * window.innerWidth + 'px';
      document.body.appendChild(bite);

      setTimeout(() => {
        bite.remove();
      }, 1000);
    }

    setInterval(() => {
      if (Math.random() > 0.7) spawnBite();
    }, 1500);
  </script>
</body>
</html>
